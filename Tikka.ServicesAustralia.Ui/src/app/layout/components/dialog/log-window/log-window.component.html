<h2 mat-dialog-title>{{data.title}}</h2>
<mat-dialog-content>
  <p>{{data.description}}</p>
  <mat-form-field class="log-area">
    <mat-label>log text</mat-label>
    <textarea matInput [(ngModel)]="output" readonly class="log-area-field"></textarea>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-flat-button (click)="onNoClick()" cdkFocusInitial>Close</button>
</mat-dialog-actions>
