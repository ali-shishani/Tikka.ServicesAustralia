<h2 mat-dialog-title>{{data.title}}</h2>
<mat-dialog-content>
  <p>{{data.description}}</p>
  <mat-form-field class="input-field">
    <mat-label>{{data.title}}</mat-label>
    <input matInput [(ngModel)]="output" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button (click)="onNoClick()">Cancel</button>
  <button mat-raised-button color="primary" [mat-dialog-close]="output()" [disabled]="!isValid()">Ok</button>
</mat-dialog-actions>
